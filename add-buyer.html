
<!doctype html><html lang='en'><head>
  <meta charset='utf-8'/><meta name='viewport' content='width=device-width, initial-scale=1'/>
  <title>Add Buyer — RENA</title>
  <link rel='stylesheet' href='assets/css/style.css'/>
</head>
<body data-page='add-buyer'>
  
<header>
  <div class='container nav'>
    <a class='logo' href='dashboard.html'>
      <img src='assets/img/logo.png' alt='Logo'/>
      <div class='brand'>
        <span class='name'>RENA Database System</span>
        <span class='sub'>Powered by SME Bank</span>
      </div>
    </a>
    <nav class='menu'>
      <a href='dashboard.html'>Dashboard</a>
      <a href='assets.html'>Assets Listing</a>
      <a href='buyers.html'>Buyer Listing</a>
      <a href='match.html'>Match Buyer × Assets</a>
      <a href='reporting.html'>Reporting</a>
      <a href='help.html'>Help</a>
    </nav>
  </div>
</header>

  <main class='container'>
    <div class='card'>
      <h2 class='section-title'>Add Buyer</h2>
      <form id='buyerForm'>
        <label>Buyer name</label>
        <input name='name' required>
        <label>Interest Asset Type (select multiple)</label>
        <div id='typeChecks' class='grid cols-2'></div>
        <label>Interest Location (select multiple)</label>
        <div id='locationChecks' class='grid cols-2'></div>
        <label>State</label>
        <select name='state' required id='stateSelect'></select>
        <div class='toolbar'>
          <button class='btn' type='submit'>Add Buyer</button>
          <a class='btn secondary' href='buyers.html'>Cancel</a>
        </div>
      </form>
      <div class='notice'>All data is stored in your browser for demo purposes.</div>
    </div>
  </main>
  
<footer>
  <div class='container footer-inner'>
    <div>© <span id='year'></span> RENA Demo</div>
    <div><a href='help.html'>Help</a> · <a href='#'>Privacy</a></div>
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</footer>

  <script src='assets/js/app.js' defer></script>
</body></html>
