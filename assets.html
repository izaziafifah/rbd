<!doctype html>
><html lang="en">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assets Listing — RBD</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body data-page="assets">

<!-- ================= HEADER ================= -->
<header>
  <div class="nav">

    <a class="logo" href="dashboard.html">
      <img src="assets/img/rbd-logo.png">
      <div class="brand">
        <span class="name">RENA Database System</span>
        <span class="sub">Powered by SME Bank</span>
      </div>
    </a>

    <nav class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="assets.html">Assets</a>
      <a href="buyers.html">Buyers</a>
      <a href="match.html">Matching</a>
      <a href="reporting.html">Reports</a>
      <a href="help.html">Help</a>

      <button onclick="toggleDark()" class="dark-btn">🌙</button>
    </nav>

  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="container">

  <!-- TITLE -->
  <section style="margin-bottom:24px;">
    <h1 style="margin:0;font-size:22px;font-weight:600;">Assets Listing</h1>
    <p style="margin-top:6px;color:var(--muted);font-size:13px;">
      Manage and review all available assets
    </p>
  </section>

  <div class="card">

    <!-- ACTION BAR -->
    <div class="toolbar">

      <a class="btn primary" href="add-asset.html">Add Asset</a>

      <button class="btn outline" onclick="exportAssetsCSV()">
        Export Data
      </button>

      <label class="btn outline">
        Import CSV
        <input type="file" id="assetCsv" hidden>
      </label>

      <label class="btn outline">
        Import Excel
        <input type="file" id="assetXlsx" hidden>
      </label>

    </div>

    <!-- FILTERS -->
    <div class="filters">

      <input id="assetSearch" placeholder="Search asset name or address">

      <select id="assetTypeFilter">
        <option value="">All Types</option>
      </select>

      <select id="assetStateFilter">
        <option value="">All States</option>
      </select>

      <button class="btn outline" onclick="clearAssetFilters()">
        Clear
      </button>

    </div>

    <!-- TABLE -->
    <table id="assetsTable">

      <thead>
        <tr>
          <th>#</th>
          <th>Asset Name</th>
          <th>Type</th>
          <th>Address</th>
          <th>State</th>
          <th style="text-align:center;">Actions</th>
        </tr>
      </thead>

      <tbody id="assetsBody">
        <!-- SAMPLE ROW -->
        <tr>
          <td>1</td>
          <td>KL Office Tower</td>
          <td>Commercial</td>
          <td>Jalan Ampang</td>
          <td>KL</td>
          <td class="actions">
            <button class="btn small outline">View</button>
            <button class="btn small outline">Edit</button>
            <button class="btn small danger">Delete</button>
          </td>
        </tr>
      </tbody>

    </table>

  </div>

</main>

<!-- ================= FOOTER ================= -->
<footer>
  <div class="container footer-inner">
    <div>© <span id="year"></span> RBD System</div>
    <div><a href="help.html">Help</a></div>
  </div>
</footer>

<!-- ================= SCRIPT ================= -->
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  function toggleDark(){
    document.body.classList.toggle('dark');
  }
</script>

<script src="assets/js/app.js" defer></script>

</body>
</html>
